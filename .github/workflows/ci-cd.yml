name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: nexah/ssl-certs-monitor-backend
  FRONTEND_IMAGE: nexah/ssl-certs-monitor-frontend
  VERSION_TAG: 1.0.${{ github.run_number }}

jobs:
  build-and-push:
    name: Build & Push Multi-Platform Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # 1. Setup QEMU (Requis pour le multi-plateforme ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NXH_DOCKERHUB_USERNAME }}
          password: ${{ secrets.NXH_DOCKERHUB_TOKEN }}

      # 3. Build & Push Backend (AMD64 + ARM64)
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.VERSION_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Build & Push Frontend (AMD64 + ARM64)
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NXH_API_URL=${{ secrets.NXH_API_URL }}