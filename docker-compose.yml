version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        # En dev, pointe vers localhost ; en prod c'est NXH_API_URL qui prend le relais
        NXH_API_URL: ${NXH_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy